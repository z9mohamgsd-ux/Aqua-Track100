kind = "web"
previewPath = "/"
title = "AquaTrack Water Monitoring Dashboard"
version = "1.0.0"
id = "artifacts/aquatrack"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 19907
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/aquatrack run dev"

[services.env]
PORT = "19907"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/aquatrack", "run", "build"]
publicDir = "artifacts/aquatrack/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
